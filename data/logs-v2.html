<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordclock — Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/chronolett.css" />
</head>
<body>
  <header class="topbar">
    <div class="page">
      <div class="container topbar-inner">
        <a href="/dashboard-v2.html" class="brand">Chronolett<span class="copper-dot">.</span> <span class="by">Logs</span></a>
        <nav class="topnav">
          <a href="/dashboard-v2.html">Dashboard</a>
          <a href="/admin-v2.html">Admin</a>
          <a href="/logs.html" class="toggle-classic">← Classic</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">

      <section class="hero">
        <p class="kicker">Logs</p>
        <h1>Archive<span class="copper-dot">.</span></h1>
        <p class="lede">Download archived log files. Newest entries first.</p>
      </section>

      <section class="chapter">
        <header class="section-head">
          <span class="section-num">01</span>
          <h2 class="section-title">Available files</h2>
        </header>
        <div class="section-aside">
          <span class="label">Logs</span>
          <div class="section-body">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
              <p class="help" style="margin:0">Click a row to download.</p>
              <button id="refreshLogs" class="btn line small">Refresh</button>
            </div>
            <ul id="logList" class="list-rows"></ul>
            <p id="logError" class="help text-err"></p>
          </div>
        </div>
      </section>

      <div class="footer-sig">
        <span>Chronolett<span class="copper">.</span></span>
        <span>v2 — editorial preview</span>
      </div>

    </div>
  </main>

  <script>
    const listEl = document.getElementById('logList');
    const errEl = document.getElementById('logError');
    const btn = document.getElementById('refreshLogs');
    async function loadLogs() {
      if (errEl) errEl.textContent = '';
      if (listEl) listEl.innerHTML = '<li><span class="meta">Loading…</span></li>';
      try {
        const res = await fetch('/api/logs');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const files = await res.json();
        if (!Array.isArray(files) || files.length === 0) {
          if (listEl) listEl.innerHTML = '<li><span class="meta">No logs available.</span></li>';
          return;
        }
        if (listEl) {
          listEl.innerHTML = '';
          files.forEach(file => {
            const li = document.createElement('li');
            const name = document.createElement('span');
            name.className = 'name';
            name.textContent = file.name;
            const meta = document.createElement('span');
            meta.className = 'meta';
            meta.textContent = file.size ? `${file.size} bytes` : '';
            const wrap = document.createElement('span');
            wrap.style.display = 'flex';
            wrap.style.gap = '12px';
            wrap.style.alignItems = 'baseline';
            wrap.appendChild(name);
            wrap.appendChild(meta);
            const link = document.createElement('a');
            link.href = '/log/download?date=' + encodeURIComponent(file.date);
            link.textContent = 'Download →';
            li.appendChild(wrap);
            li.appendChild(link);
            listEl.appendChild(li);
          });
        }
      } catch (err) {
        if (errEl) errEl.textContent = 'Failed to load logs (' + err.message + ')';
        if (listEl) listEl.innerHTML = '';
      }
    }
    if (btn) btn.addEventListener('click', loadLogs);
    loadLogs();
  </script>
</body>
</html>
