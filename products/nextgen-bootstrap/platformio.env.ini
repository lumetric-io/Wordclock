[env:nextgen-bootstrap]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -Iproducts/nextgen-bootstrap
    -include product_config.h
    -DPRODUCT_CONFIG_HEADER=\"product_config.h\"
; Trim lib_deps: bootstrap doesn't drive LEDs (no Adafruit NeoPixel) and
; doesn't talk to MQTT (no PubSubClient). Listing lib_deps here replaces
; the base inheritance entirely. Keeps the .pio cache lean and the build
; fast.
lib_deps =
    https://github.com/tzapu/WiFiManager.git
    bblanchon/ArduinoJson@^7.4.1
build_src_filter =
    -<*>
    +<log.cpp>
    +<ota_updater.cpp>
    +<system_utils.cpp>
    +<bootstrap_main.cpp>
    +<bootstrap_provision.cpp>
