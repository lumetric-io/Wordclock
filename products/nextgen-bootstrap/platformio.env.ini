[env:nextgen-bootstrap]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -Iproducts/nextgen-bootstrap
    -include product_config.h
    -DPRODUCT_CONFIG_HEADER=\"product_config.h\"
build_src_filter =
    -<*>
    +<log.cpp>
    +<ota_updater.cpp>
    +<system_utils.cpp>
    +<bootstrap_main.cpp>
    +<bootstrap_provision.cpp>
