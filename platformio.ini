; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs =
    upload_params.ini
    products/nextgen-30x30/platformio.env.ini
    products/nextgen-50x50/platformio.env.ini
    products/nextgen-logo-55x50/platformio.env.ini
    products/nextgen-logo-100x100/platformio.env.ini
    products/nextgen-mini/platformio.env.ini
data_dir = data


[env:base]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.filesystem = littlefs
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.psram_size = 8MB
board_build.memory_type = qio_opi
board_build.flash_mode = qio
board_build.partitions = partitions/nextgen_16mb_ota.csv
monitor_speed = 115200
upload_speed = 460800
build_flags =
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DNDEBUG
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    https://github.com/tzapu/WiFiManager.git
    adafruit/Adafruit NeoPixel @ ^1.12.1
    bblanchon/ArduinoJson@^7.4.1
    knolleary/PubSubClient@^2.8
extra_scripts =
    pre:tools/set_grid_filter.py
    tools/full_upload.py
    tools/generate_build_info.py

; Native testing environment (runs on PC)
[env:native]
platform = native
test_framework = googletest
build_flags = 
    -std=c++17
    -DPIO_UNIT_TESTING
    -DNATIVE_BUILD
    -I test/mocks
lib_deps =
    bblanchon/ArduinoJson@^7.4.1

; Native testing with coverage (Linux/CI only - has linker issues on macOS)
[env:native_coverage]
platform = native
test_framework = googletest
build_flags =
    -std=c++17
    -DPIO_UNIT_TESTING
    -DNATIVE_BUILD
    -I test/mocks
    --coverage
    -fprofile-arcs
    -ftest-coverage
    -lgcov
lib_deps =
    bblanchon/ArduinoJson@^7.4.1
debug_test = *
build_type = debug
